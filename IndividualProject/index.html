<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Abhay Dodge VR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
 
<body>
 
<div id="startScreen" style="position:absolute; width:100%; height:100%; background:black; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; font-size:30px; z-index:10;">
  <div>Abhay Bhullar - CMPT 461</div>
  <div style="font-size: 20px; margin-top: 20px;">Click to Start</div>
</div>
 
<a-scene background="color: #87CEEB" vr-mode-ui="enabled: true">
    <a-assets>
      <img id="buildingTex" src="https://i.imgur.com/9Q9Z1Zm.jpg">
    </a-assets>
 
    <a-entity id="rig" position="0 0 0" head-move-rig>
        <a-entity id="playerCam" camera look-controls position="0 1.6 0">
            <a-text id="scoreText" value="Score: 0" position="-0.8 0.5 -1" width="2" color="black"></a-text>
            <a-text id="levelText" value="Level 1" position="0.5 0.5 -1" width="2" color="red"></a-text>
        </a-entity>
    </a-entity>
 
    <a-sky color="#87CEEB"></a-sky>
    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="0 10 5" intensity="1"></a-light>
    <a-plane rotation="-90 0 0" width="20" height="100" color="#555"></a-plane>
 
    <a-box class="obstacle" position="0 3 -10" width="2" height="6" depth="2" material="src: #buildingTex"></a-box>
    <a-box class="obstacle" position="3 4 -15" width="2" height="8" depth="2" material="src: #buildingTex"></a-box>
    <a-box class="obstacle" position="-3 2.5 -20" width="2" height="5" depth="2" material="src: #buildingTex"></a-box>
</a-scene>
 
<script>
let score = 0;
let speed = 0.10;
let level = 1;
let gameStarted = false;
let gameOver = false;
 
// ── Web Audio API ──────────────────────────────────────────────
let audioCtx = null;
let bgmNode = null;   // holds the looping BGM oscillator group
let bgmGain = null;
 
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
 
// Simple chiptune-style BGM using oscillators
function startBGM() {
  const ctx = getAudioCtx();
  if (bgmNode) return; // already playing
 
  bgmGain = ctx.createGain();
  bgmGain.gain.setValueAtTime(0.08, ctx.currentTime);
  bgmGain.connect(ctx.destination);
 
  // Notes for a looping melody (frequencies in Hz)
  const melody = [262, 294, 330, 349, 392, 349, 330, 294,
                   262, 262, 294, 330, 262, 330, 392, 392];
  const noteDur = 0.18;
  let noteIndex = 0;
 
  function scheduleNote() {
    if (!bgmGain) return; // stopped
    const osc = ctx.createOscillator();
    const noteGain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(melody[noteIndex % melody.length], ctx.currentTime);
    noteGain.gain.setValueAtTime(1, ctx.currentTime);
    noteGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + noteDur * 0.9);
    osc.connect(noteGain);
    noteGain.connect(bgmGain);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + noteDur);
    noteIndex++;
    bgmNode = setTimeout(scheduleNote, noteDur * 1000);
  }
  scheduleNote();
}
 
function stopBGM() {
  if (bgmNode) { clearTimeout(bgmNode); bgmNode = null; }
  if (bgmGain) { bgmGain.disconnect(); bgmGain = null; }
}
 
// Crash / game-over sound
function playCrash() {
  const ctx = getAudioCtx();
  const gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(0.4, ctx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
  gainNode.connect(ctx.destination);
 
  // White noise burst
  const bufSize = ctx.sampleRate * 0.8;
  const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;
  noise.connect(gainNode);
  noise.start();
 
  // Low thud underneath
  const osc = ctx.createOscillator();
  const oscGain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(80, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(20, ctx.currentTime + 0.5);
  oscGain.gain.setValueAtTime(0.5, ctx.currentTime);
  oscGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
  osc.connect(oscGain);
  oscGain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.5);
}
// ──────────────────────────────────────────────────────────────
 
document.body.onclick = () => {
  if (gameOver) return;
 
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().catch(console.error);
  }
 
  document.getElementById("startScreen").style.display = "none";
  startBGM();
  gameStarted = true;
};
 
AFRAME.registerComponent('head-move-rig', {
  init: function () {
    this.rigWorldPos = new THREE.Vector3();
    this.objWorldPos = new THREE.Vector3();
  },
 
  tick: function () {
    if (!gameStarted || gameOver) return;
 
    // Player movement
    let camRot = document.querySelector('#playerCam').getAttribute('rotation');
    let rigPos = this.el.getAttribute('position');
 
    if (camRot.y > 6)  rigPos.x -= 0.07;
    if (camRot.y < -6) rigPos.x += 0.07;
    rigPos.x = Math.max(Math.min(rigPos.x, 6), -6);
    this.el.setAttribute('position', rigPos);
 
    score++;
    document.querySelector("#scoreText").setAttribute("value", "Score: " + score);
 
    // Level progression
    if (score > 1000 && level === 1) {
      level = 2;
      speed = 0.18;
      document.querySelector("#levelText").setAttribute("value", "Level 2");
    } else if (score > 2500 && level === 2) {
      level = 3;
      speed = 0.26;
      document.querySelector("#levelText").setAttribute("value", "Level 3");
    }
 
    const playerX = rigPos.x;
    const playerZ = 0;
 
    // Obstacles
    document.querySelectorAll(".obstacle").forEach(ob => {
      ob.object3D.position.z += speed;
 
      if (ob.object3D.position.z > 2) {
        ob.object3D.position.z = -30 - Math.random() * 10;
        let lanes = [-4, 0, 4];
        ob.object3D.position.x = lanes[Math.floor(Math.random() * lanes.length)];
      }
 
      const obX = ob.object3D.position.x;
      const obZ = ob.object3D.position.z;
      const dx = Math.abs(obX - playerX);
      const dz = Math.abs(obZ - playerZ);
 
      if (dx < 1.5 && dz < 1.5) {
        triggerGameOver();
      }
    });
  }
});
 
function triggerGameOver() {
  if (gameOver) return;
  gameOver = true;
  gameStarted = false;
  speed = 0;
  stopBGM();
  playCrash();
 
  // Save high score
  const prev = parseInt(localStorage.getItem('highScore') || '0');
  if (score > prev) localStorage.setItem('highScore', score);
  const best = localStorage.getItem('highScore');
 
  setTimeout(() => {
    alert("Game Over!\nScore: " + score + "\nHigh Score: " + best);
    location.reload();
  }, 800);
}
</script>
</body>
</html>
