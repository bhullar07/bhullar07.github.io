<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Abhay Dodge VR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

<!-- Start Screen -->
<div id="startScreen" style="position:absolute; width:100%; height:100%; background:black; color:white; display:flex; justify-content:center; align-items:center; font-size:30px; z-index:10;">
  Click to Start Game
</div>

<a-scene background="color: #87CEEB">

    <!-- SKY -->
    <a-sky color="#87CEEB"></a-sky>
  
    <!-- LIGHTING  -->
    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="0 10 5" intensity="1"></a-light>
  
    <!-- Assets -->
    <a-assets>
      <img id="buildingTex" src="https://i.imgur.com/9Q9Z1Zm.jpg">
      <audio id="bgm" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b4c3b.mp3?filename=arcade-music-loop-110624.mp3"></audio>
      <audio id="crash" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_270f49b9f1.mp3?filename=retro-game-over-213.wav"></audio>
    </a-assets>
  
    <!-- Player -->
    <a-entity id="player" camera position="0 1.6 0" head-move></a-entity>
  
    <!-- Ground -->
    <a-plane rotation="-90 0 0" width="20" height="100" color="#555"></a-plane>
  
    <!-- BUILDINGS  -->
    <a-box class="obstacle"
           position="0 3 -10"
           width="2" height="6" depth="2"
           material="src: #buildingTex; roughness: 1; metalness: 0">
    </a-box>
  
    <a-box class="obstacle"
           position="3 4 -15"
           width="2" height="8" depth="2"
           material="src: #buildingTex; roughness: 1; metalness: 0">
    </a-box>
  
    <a-box class="obstacle"
           position="-3 2.5 -20"
           width="2" height="5" depth="2"
           material="src: #buildingTex; roughness: 1; metalness: 0">
    </a-box>
  
    <!-- Score -->
    <a-text id="scoreText" value="Score: 0" position="-1 2 -3" color="black"></a-text>
  
    <!-- Level -->
    <a-text id="levelText" value="Level 1" position="1 2 -3" color="red"></a-text>
  
  </a-scene>
<script>
let score = 0;
let speed = 0.1;
let level = 1;
let gameStarted = false;

// Start game
document.body.onclick = () => {
  document.getElementById("startScreen").style.display = "none";
  document.querySelector("#bgm").play();
  gameStarted = true;
};

AFRAME.registerComponent('head-move', {
  tick: function () {

    if (!gameStarted) return;

    let rot = this.el.getAttribute('rotation');
    let pos = this.el.object3D.position;

    // Head movement
    if (rot.y > 10) pos.x += 0.05;
    if (rot.y < -10) pos.x -= 0.05;

    // Score
    score += 1;
    document.querySelector("#scoreText")
      .setAttribute("value", "Score: " + score);

    // LEVEL SYSTEM
    if (score > 2000 && level === 1) {
      level = 2;
      speed = 0.2;
      document.querySelector("#levelText")
        .setAttribute("value", "Level 2");
    }

    // Move obstacles
    document.querySelectorAll(".obstacle").forEach(ob => {
      ob.object3D.position.z += speed;

      // Reset
      if (ob.object3D.position.z > 2) {

        // Send building far back
        ob.object3D.position.z = -20 - Math.random() * 20;

        // Random lane (-3 to +3)
        let lanes = [-3, 0, 3];
        ob.object3D.position.x = lanes[Math.floor(Math.random() * lanes.length)];

        // Random height (3 to 10)
        let height = 3 + Math.random() * 7;
        ob.setAttribute("height", height);

        // Adjust Y so it sits on ground
    ob.object3D.position.y = height / 2;
    }

      // Collision
      let dist = ob.object3D.position.distanceTo(pos);
      if (dist < 1.5) {
        document.querySelector("#bgm").pause();
        document.querySelector("#crash").play();
        setTimeout(() => {
          alert("Game Over! Score: " + score);
          location.reload();
        }, 300);
      }
    });

  }
});
</script>

</body>
</html>
